<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ " /assets/css/main.css" | relative_url }}">
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
</head>

<header>
  <nav>
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ " /" | relative_url }}">{{ site.title }}</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <ul>
        <li>
          <a class="nav-link {% if page.url == '/' %}active{% endif %}" href="{{ " /" | relative_url }}">Home</a>
        </li>
        <li>
          <a class="nav-link {% if page.url == '/projects/' %}active{% endif %}" href="{{ " /projects/" | relative_url
            }}">Projects</a>
        </li>
        <li>
          <a class="nav-link {% if page.url == '/about/' %}active{% endif %}" href="{{ " /about/" | relative_url
            }}">About Me</a>
        </li>
        <li>
          <a class="nav-link {% if page.url == '/cv/' %}active{% endif %}" href="{{ " /cv/" | relative_url }}">CV</a>
        </li>
      </ul>

    </div>
  </nav>
</header>


<main class="container">
  {{ content }}
</main>

<footer class="footer navbar-dark text-white text-center" ;>
  <div class="container">
    &copy; 2024 {{ site.name }}. All rights not reserved.
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
